<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fundo arredondado -->
  <rect width="512" height="512" rx="112" fill="#0d0f1a"/>
  <!-- Círculo de brilho -->
  <circle cx="256" cy="256" r="190" fill="#1a0d2e"/>
  <circle cx="256" cy="256" r="170" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.4"/>
  <!-- Lâmina da espada -->
  <polygon points="256,68 268,280 244,280" fill="url(#blade)"/>
  <!-- Ponta da lâmina -->
  <polygon points="244,280 268,280 256,320" fill="#6d28d9"/>
  <!-- Guarda cruzada -->
  <rect x="196" y="292" width="120" height="20" rx="10" fill="url(#guard)"/>
  <!-- Cabo -->
  <rect x="249" y="312" width="14" height="72" rx="7" fill="#5b21b6"/>
  <!-- Pomo -->
  <circle cx="256" cy="396" r="12" fill="url(#pommel)"/>
  <!-- Brilho da lâmina -->
  <line x1="256" y1="78" x2="256" y2="270" stroke="#c4b5fd" stroke-width="2" opacity="0.5"/>
  <!-- Estrelas decorativas -->
  <circle cx="152" cy="148" r="5" fill="#fbbf24" opacity="0.9"/>
  <circle cx="368" cy="176" r="3.5" fill="#fbbf24" opacity="0.7"/>
  <circle cx="144" cy="350" r="4" fill="#a78bfa" opacity="0.8"/>
  <circle cx="374" cy="334" r="5.5" fill="#fbbf24" opacity="0.6"/>
  <circle cx="186" cy="420" r="3" fill="#a78bfa" opacity="0.5"/>
  <circle cx="338" cy="124" r="3" fill="#c4b5fd" opacity="0.6"/>
  <!-- Gradientes -->
  <defs>
    <linearGradient id="blade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="guard" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <radialGradient id="pommel">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </radialGradient>
  </defs>
</svg>
